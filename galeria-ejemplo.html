<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANARCOFOTOGRAFÍA - Galería Ejemplo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background-color: #fdfdfd;
      color: #111;
      padding: 40px 20px;
    }

    nav {
      text-align: center;
      margin-bottom: 20px;
    }

    nav a {
      color: #111;
      text-decoration: none;
      margin: 0 8px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    hr {
      border: none;
      border-top: 1px solid #aaa;
      margin-bottom: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2em;
    }

    /* GALERÍA MASONRY - DESORDENADA PERO ORGANIZADA */
    .galeria {
      column-count: 4;
      column-gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .galeria-item {
      break-inside: avoid;
      margin-bottom: 20px;
      cursor: pointer;
      overflow: hidden;
      border-radius: 8px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .galeria-item:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .galeria-item img {
      width: 100%;
      display: block;
      transition: filter 0.3s;
    }

    .galeria-item:hover img {
      filter: brightness(0.9);
    }

    /* MODAL LIGHTBOX - AMPLIAR FOTO */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      animation: fadeIn 0.3s;
    }

    .lightbox.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      background: none;
      border: none;
      z-index: 1000;
    }

    .lightbox-close:hover {
      color: #ccc;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      color: white;
      font-size: 40px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border: none;
      transition: background 0.3s;
      z-index: 1000;
    }

    .lightbox-nav:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* RESPONSIVE - Menos columnas en pantallas pequeñas */
    @media (max-width: 1200px) {
      .galeria {
        column-count: 3;
      }
    }

    @media (max-width: 768px) {
      .galeria {
        column-count: 2;
      }
    }

    @media (max-width: 480px) {
      .galeria {
        column-count: 1;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Inicio</a> ·
    <a href="manifiesto.html">Manifiesto</a> ·
    <a href="galeria.html">Galería</a> ·
    <a href="proyectos.html">Proyectos</a> ·
    <a href="archivo.html">Archivo</a> ·
    <a href="contacto.html">Contacto</a>
  </nav>
  <hr>

  <h1>galeria</h1>

  <!-- GALERÍA MASONRY -->
  <div class="galeria" id="galeria">
    <!-- Las imágenes se generan automáticamente para el ejemplo -->
  </div>

  <!-- LIGHTBOX - Modal para ampliar fotos -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="cerrarLightbox()">×</button>
    <button class="lightbox-nav lightbox-prev" onclick="fotoAnterior()">❮</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
    </div>
    <button class="lightbox-nav lightbox-next" onclick="fotoSiguiente()">❯</button>
  </div>

  <script>
    // Colores y tama��os variados para simular fotos desordenadas
    const colores = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
    const alturas = [250, 300, 280, 350, 270, 320, 290, 310, 280, 300];
    
    let fotoActual = 0;
    let todasLasFotos = [];

    // Crear galería de ejemplo
    function crearGaleria() {
      const galeria = document.getElementById('galeria');
      
      for (let i = 1; i <= 12; i++) {
        const item = document.createElement('div');
        item.className = 'galeria-item';
        
        const img = document.createElement('img');
        const color = colores[i % colores.length];
        const altura = alturas[i % alturas.length];
        
        // Crear imagen con placeholder
        img.src = `https://via.placeholder.com/400x${altura}/${color.replace('#', '')}/ffffff?text=Foto+${i}`;
        img.alt = `Foto ${i}`;
        
        img.onclick = () => abrirLightbox(i - 1);
        
        item.appendChild(img);
        galeria.appendChild(item);
        
        todasLasFotos.push(img.src);
      }
    }

    // Abrir lightbox
    function abrirLightbox(index) {
      fotoActual = index;
      document.getElementById('lightbox-img').src = todasLasFotos[fotoActual];
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Cerrar lightbox
    function cerrarLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Navegar a foto anterior
    function fotoAnterior() {
      fotoActual = (fotoActual - 1 + todasLasFotos.length) % todasLasFotos.length;
      document.getElementById('lightbox-img').src = todasLasFotos[fotoActual];
    }

    // Navegar a foto siguiente
    function fotoSiguiente() {
      fotoActual = (fotoActual + 1) % todasLasFotos.length;
      document.getElementById('lightbox-img').src = todasLasFotos[fotoActual];
    }

    // Cerrar con ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') cerrarLightbox();
      if (e.key === 'ArrowLeft') fotoAnterior();
      if (e.key === 'ArrowRight') fotoSiguiente();
    });

    // Crear galería al cargar
    crearGaleria();
  </script>

</body>
</html>
